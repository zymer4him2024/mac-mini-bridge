# RAG eval cases. Hand-edit; expand as new queries arrive.
#
# Per-case schema:
#   name             (required)  kebab-case identifier, unique within the file
#   uid              (required)  Firestore user id (or pass --uid to override)
#   subject_slug     (required)  folder slug, must match users/{uid}/folders/<slug>
#   subject          (required)  human subject string for the LLM prompt
#   question         (required)  the user's natural-language question
#
#   expected_lead_ids       optional list of leadId values. If present, recall@k
#                           passes only when at least one appears in the top-k hits.
#   max_top_distance        optional float. Top-1 hit's cosine distance must be <= this.
#   min_relevant_count      optional int. >=N hits must clear RAG_DISTANCE_THRESHOLD.
#
#   expected_keywords       optional list. ALL must appear in the answer (case-insensitive).
#   forbidden_keywords      optional list. NONE may appear (catches cross-folder bleed).
#   expected_refusal        optional bool. If true, answer must contain "I don't have".
#
# Tip: start with retrieval-only expectations (min_relevant_count, max_top_distance)
# and run the eval. Read the actual answers, then add expected_keywords iteratively.

