name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python (lint, type-check, security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit mypy

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Bandit security scan
        run: bandit -r . -x ./venv,./tests,./node_modules

      - name: Mypy strict type-check
        run: mypy --strict --ignore-missing-imports --exclude '(venv|migrate_.*\.py|backfill_.*\.py)' .
        continue-on-error: true

  portal:
    name: Portal (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/email2ppt-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/email2ppt-portal/package-lock.json

      - name: Install portal deps
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

  functions:
    name: Cloud Functions (lint, build, test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/email2ppt-portal/functions
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/email2ppt-portal/functions/package-lock.json

      - name: Install functions deps
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build --if-present

      - name: Test
        run: npm test --if-present

  rules-tests:
    name: Firestore rules tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/email2ppt-portal
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/email2ppt-portal/package-lock.json

      - name: Install portal deps
        run: npm ci

      - name: Run rules tests
        run: npm run test:rules --if-present

  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: pre-commit/action@v3.0.1
